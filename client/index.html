<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloquin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f5f5f0;
      --surface:    #ffffff;
      --border:     #e0ddd5;
      --text:       #1a1a18;
      --text-muted: #6b6b65;
      --accent:     #2563eb;
      --accent-hover: #1d4ed8;
      --success:    #16a34a;
      --warning:    #d97706;
      --danger:     #dc2626;
      --radius:     8px;
      --shadow:     0 1px 3px rgba(0,0,0,.08);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ── Utilitários ── */
    .hidden { display: none !important; }

    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      padding: 7px 14px;
      transition: background .15s, opacity .15s;
    }
    button:disabled { opacity: .5; cursor: not-allowed; }

    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover:not(:disabled) { background: #d4d0c8; }
    .btn-danger    { background: var(--danger); color: #fff; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }

    /* ── Páginas ── */
    #page-login, #page-editor { height: 100vh; }

    /* ── Login ── */
    #page-login {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 340px;
      box-shadow: var(--shadow);
    }
    .login-card h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .login-card p {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 28px;
    }
    .login-card label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 5px;
      margin-top: 14px;
    }
    #login-error {
      margin-top: 14px;
      padding: 10px 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius);
      color: var(--danger);
      font-size: 13px;
    }
    #login-btn { width: 100%; margin-top: 20px; padding: 10px; }

    /* ── Editor layout ── */
    #page-editor {
      display: flex;
      flex-direction: column;
    }
    .topbar {
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar-brand {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -.3px;
      margin-right: 8px;
    }
    #project-name-input {
      width: 180px;
      padding: 5px 10px;
      font-size: 13px;
    }
    .topbar-spacer { flex: 1; }
    #user-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .editor-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Blockly ocupa o espaço principal */
    #blockly-container {
      flex: 1;
      position: relative;
    }
    #blockly-div {
      position: absolute;
      inset: 0;
    }

    /* ── Painel lateral de status ── */
    .side-panel {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-section {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .panel-section h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .panel-actions { display: flex; gap: 8px; }
    .panel-actions button { flex: 1; }

    /* Status badge */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--border);
    }
    .status-dot.idle     { background: var(--border); }
    .status-dot.queued   { background: var(--warning); }
    .status-dot.compiling{ background: var(--accent); animation: pulse .8s ease-in-out infinite alternate; }
    .status-dot.done     { background: var(--success); }
    .status-dot.error    { background: var(--danger); }
    @keyframes pulse { to { opacity: .3; } }

    #status-text {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Log de compilação */
    #compile-log {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.6;
      color: var(--text-muted);
      background: var(--bg);
      white-space: pre-wrap;
      word-break: break-all;
    }
    #compile-log .log-error { color: var(--danger); }
    #compile-log .log-success { color: var(--success); }
    #compile-log .log-info { color: var(--accent); }

    /* Projetos */
    #project-list {
      overflow-y: auto;
      max-height: 180px;
    }
    .project-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .1s;
    }
    .project-item:hover { background: var(--bg); }
    .project-item.active { background: #eff6ff; color: var(--accent); }
    .project-item span { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .project-item button {
      padding: 2px 8px;
      font-size: 11px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .project-item button:hover { color: var(--danger); border-color: var(--danger); }
  </style>
</head>
<body>

  <!-- Página de login -->
  <div id="page-login" class="hidden">
    <div class="login-card">
      <h1>Bloquin</h1>
      <p>Programação visual para ESP32</p>
      <label for="login-username">Usuário</label>
      <input id="login-username" type="text" placeholder="ex: aluno01" autocomplete="username">
      <label for="login-password">Senha</label>
      <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password">
      <div id="login-error" class="hidden"></div>
      <button id="login-btn" class="btn-primary">Entrar</button>
    </div>
  </div>

  <!-- Página do editor -->
  <div id="page-editor" class="hidden">

    <div class="topbar">
      <span class="topbar-brand">Bloquin</span>
      <input id="project-name-input" type="text" placeholder="Nome do projeto">
      <button id="btn-save" class="btn-secondary">Salvar</button>
      <button id="btn-new-project" class="btn-secondary">+ Novo</button>
      <div class="topbar-spacer"></div>
      <span id="user-label"></span>
      <button id="btn-logout" class="btn-secondary">Sair</button>
    </div>

    <div class="editor-body">

      <div id="blockly-container">
        <div id="blockly-div"></div>
      </div>

      <div class="side-panel">

        <!-- Ações de compilação -->
        <div class="panel-section">
          <h3>Compilação</h3>
          <div class="panel-actions">
            <button id="btn-compile" class="btn-primary">▶ Compilar</button>
            <button id="btn-download" class="btn-secondary hidden">⬇ Baixar .bin</button>
          </div>
          <div class="status-row">
            <div id="status-dot" class="status-dot idle"></div>
            <span id="status-text">Pronto</span>
          </div>
        </div>

        <!-- Log de compilação -->
        <div id="compile-log"></div>

        <!-- Projetos -->
        <div class="panel-section" style="border-top: 1px solid var(--border); border-bottom: none;">
          <h3>Meus projetos</h3>
          <div id="project-list"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- Toolbox Blockly (oculto, referenciado via JS) -->
  <xml id="toolbox" style="display:none">
    <category name="Controle" colour="#f97316">
      <block type="blq_delay"></block>
      <block type="blq_setup_loop"></block>
    </category>
    <category name="Digital" colour="#2563eb">
      <block type="blq_pin_mode"></block>
      <block type="blq_digital_write"></block>
      <block type="blq_digital_read"></block>
    </category>
    <category name="Serial" colour="#16a34a">
      <block type="blq_serial_begin"></block>
      <block type="blq_serial_print"></block>
    </category>
    <category name="Variáveis" colour="#7c3aed" custom="VARIABLE"></category>
    <category name="Lógica" colour="#d97706">
      <block type="controls_if"></block>
      <block type="logic_compare"></block>
      <block type="logic_boolean"></block>
    </category>
    <category name="Loops" colour="#db2777">
      <block type="controls_repeat_ext"></block>
      <block type="controls_whileUntil"></block>
    </category>
    <category name="Matemática" colour="#0891b2">
      <block type="math_number"></block>
      <block type="math_arithmetic"></block>
    </category>
    <category name="Texto" colour="#65a30d">
      <block type="text"></block>
      <block type="text_join"></block>
    </category>
  </xml>

  <!-- Blockly via CDN -->
  <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
  <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
  <script src="https://unpkg.com/blockly/msg/pt-br.js"></script>

  <!-- App -->
  <script type="module" src="/services/api.js"></script>
  <script type="module" src="/services/websocket.js"></script>
  <script type="module" src="/pages/login.js"></script>
  <script type="module" src="/pages/editor.js"></script>
  <script type="module" src="/main.js"></script>
</body>
</html>
